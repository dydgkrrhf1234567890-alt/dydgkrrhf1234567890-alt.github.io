<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ADVC EMPIRE - AETHER GATE</title>
    <style>
        body { background: #000; color: #FFD700; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .container { border: 5px solid #FFD700; padding: 40px; border-radius: 30px; box-shadow: 0 0 100px rgba(255, 215, 0, 0.3); text-align: center; background: radial-gradient(circle, #1a1a2e 0%, #000 100%); position: relative; max-width: 800px; width: 90%; }
        h1 { font-size: 3.5rem; text-shadow: 0 0 20px #FFD700; margin: 10px 0; animation: glow 2s ease-in-out infinite alternate; }
        .heart { font-size: 80px; color: #ff0000; animation: beat 0.8s infinite; margin-bottom: 20px; }
        .price { font-size: 2.5rem; font-weight: bold; color: #00ffcc; margin: 20px 0; border-top: 1px solid #FFD700; border-bottom: 1px solid #FFD700; padding: 10px 0; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; font-size: 1.2rem; }
        .stat-box { border: 1px solid rgba(255, 215, 0, 0.5); padding: 15px; border-radius: 15px; background: rgba(255, 215, 0, 0.05); }
        .gate-button { background: linear-gradient(45deg, #FFD700, #FFA500); color: #000; border: none; padding: 15px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 50px; cursor: pointer; margin-top: 40px; transition: 0.3s; box-shadow: 0 0 30px #FFD700; }
        .gate-button:hover { transform: scale(1.1); box-shadow: 0 0 50px #FFD700; }
        @keyframes glow { from { text-shadow: 0 0 10px #FFD700; } to { text-shadow: 0 0 30px #FFD700, 0 0 10px #fff; } }
        @keyframes beat { 0% { transform: scale(1); } 20% { transform: scale(1.1); } 40% { transform: scale(1); } 60% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="container">
        <div class="heart">❤</div>
        <p style="font-size: 1.5rem; color: #fff; letter-spacing: 5px;">SOVEREIGN GATEWAY</p>
        <h1>M &hearts; R</h1>
        <p style="font-size: 1.2rem; color: #aaa;">[ADVC 제국: 디지털 파라다이스]</p>
        
        <div class="price">CURRENT VALUE: $6,160.26</div>
        
        <div class="stats">
            <div class="stat-box">ROBOT NODES<br><span style="color:#fff">1,002,253</span></div>
            <div class="stat-box">MANA HARVEST<br><span style="color:#fff">90,051 Pts</span></div>
            <div class="stat-box">TERRITORIES<br><span style="color:#fff">11 ACTIVE</span></div>
            <div class="stat-box">CEX LISTING<br><span style="color:#fff">VICTORY</span></div>
        </div>
        
        <button class="gate-button" onclick="alert('Welcome to the Digital Paradise, Citizen of ADVC.')">ENTER AETHER GATE</button>
    </div>

    <script>
        const container = document.getElementById('particles');
        for(let i=0; i<100; i++) {
            const p = document.createElement('div');
            p.style.position = 'absolute';
            p.style.background = '#FFD700';
            p.style.borderRadius = '50%';
            p.style.width = Math.random() * 3 + 'px';
            p.style.height = p.style.width;
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.opacity = Math.random();
            p.style.animation = `float ${Math.random() * 5 + 5}s infinite`;
            container.appendChild(p);
        }
    </script>
</body>
</html>
